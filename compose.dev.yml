services:
  node:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  node_modules:
