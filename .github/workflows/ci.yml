name: CI

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, types e build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript (tsc --noEmit via project references)
        run: npm run typecheck

      - name: Build de produção (Vite)
        run: npm run build:vite

  docker:
    name: Docker (compose + build prod)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Gerar .env temporário para compose
        run: |
          printf 'VITE_API_BASE_URL=%s\n' "$VITE_API_BASE_URL" > .env

      - name: Validar compose produção
        run: docker compose -f compose.yml config -q

      - name: Build imagem produção
        run: docker build --file Dockerfile --tag student-blogging-frontend:prod .
